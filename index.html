<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teleprompter Inteligente - Agape News</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Evita barras de scroll rebeldes */
        }
        /* Controles superiores */
        #panel-controles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(20, 20, 20, 0.95);
            padding: 12px 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            z-index: 10;
            border-bottom: 1px solid #333;
            flex-wrap: wrap;
        }
        button, select {
            background: #222;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 4px;
            font-weight: 500;
            transition: background 0.2s;
        }
        button:hover, select:hover { 
            background: #444; 
            border-color: #777;
        }
        select {
            background-color: #111;
            color: #00ff00; /* Resalta el noticiero activo */
            font-weight: bold;
            outline: none;
        }
        label { 
            font-size: 14px; 
            color: #aaa; 
            font-weight: bold;
        }
        #val-velocidad {
            color: #00ff00;
        }

        /* Contenedor del texto del teleprompter */
        #contenedor-texto {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            overflow-y: auto;
            padding: 45vh 12% 55vh 12%; /* Mantiene la lectura al centro de la pantalla */
            scroll-behavior: linear;
        }
        
        /* Ocultar barra de scroll para limpieza visual */
        #contenedor-texto::-webkit-scrollbar {
            display: none;
        }
        #contenedor-texto {
            -ms-overflow-style: none;  /* IE y Edge */
            scrollbar-width: none;  /* Firefox */
        }

        #texto {
            font-size: 56px; 
            line-height: 1.6;
            font-weight: bold;
            white-space: pre-wrap; /* Respeta estrictamente los saltos de línea inyectados por JS */
            transition: transform 0.2s;
            text-align: left;
        }
        
        /* Efecto Espejo para cristales físicos de teleprompter */
        .espejo {
            transform: scaleX(-1);
            text-align: right; 
        }
        
        /* Línea de guía visual central para el locutor */
        #guia-lectura {
            position: fixed;
            top: 50%;
            left: 0;
            width: 100%;
            height: 80px;
            transform: translateY(-50%);
            border-top: 2px dashed rgba(0, 255, 0, 0.3);
            border-bottom: 2px dashed rgba(0, 255, 0, 0.3);
            background: rgba(0, 255, 0, 0.02);
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div id="panel-controles">
        <!-- Selector de Programa (Switch) -->
        <label for="selector-guion">Noticiero Activo:</label>
        <select id="selector-guion">
            <option value="adultos">Ágape News (Adultos)</option>
            <option value="jovenes">Explo News (Jóvenes)</option>
        </select>

        <button id="btn-play">Play / Pausa (Espacio)</button>
        <label>Velocidad: <span id="val-velocidad">2.0</span></label>
        <button id="btn-subir">Más veloz (↑)</button>
        <button id="btn-bajar">Más lento (↓)</button>
        <button id="btn-espejo">Modo Espejo</button>
        <button id="btn-recargar">Actualizar Guión</button>
    </div>

    <div id="guia-lectura"></div>

    <div id="contenedor-texto">
        <div id="texto">Sincronizando el guión...</div>
    </div>

    <script>
        // Enlaces oficiales de publicación de Google Docs de tus dos programas
        const URL_ADULTOS = "https://docs.google.com/document/d/e/2PACX-1vQuhi11tw2fjldO-WZL-VBsgx61S_5rN3H-qhVJoZDfwmp2YdqUaf5I4XB7MphoiS_Kwq14Urf39UJn/pub";
        const URL_JOVENES = "https://docs.google.com/document/d/e/2PACX-1vRXat0Cow8oIMGgPRgwhwWI5vBAy53Q5diaiFBRqO2I4eU9MA1yiGD3ILLNhwDFF5uXtds2sOcu3JzV/pub";

        const contenedor = document.getElementById('contenedor-texto');
        const txtDiv = document.getElementById('texto');
        const selectorGuion = document.getElementById('selector-guion');
        
        let velocidad = 2.0; 
        let enMovimiento = false;
        let idAnimacion = null;

        // Función para obtener los datos del programa seleccionado
        function obtenerDatosPrograma() {
            if (selectorGuion.value === 'jovenes') {
                return { url: URL_JOVENES, nombre: "Explo News" };
            }
            return { url: URL_ADULTOS, nombre: "Ágape News" };
        }

        // Función que extrae y separa correctamente los párrafos de Google Docs
        async function cargarGuion() {
            const programa = obtenerDatosPrograma();
            try {
                txtDiv.innerText = `Sincronizando el guión de ${programa.nombre}...`;
                document.title = `Teleprompter - ${programa.nombre}`;
                
                // Evitamos el caché agregando una marca de tiempo al final de la URL
                const respuesta = await fetch(`${programa.url}?nocache=${new Date().getTime()}`);
                
                if (!respuesta.ok) throw new Error("No se pudo conectar");
                
                const htmlBruto = await respuesta.text();
                
                // Creamos un elemento temporal para parsear el código HTML del documento publicado
                const parser = new DOMParser();
                const docHtml = parser.parseFromString(htmlBruto, 'text/html');
                
                // Google Docs estructura cada línea o bloque de texto en etiquetas de párrafo <p>
                const parrafos = docHtml.querySelectorAll('#contents p');
                
                if (parrafos.length > 0) {
                    // Mapeamos los párrafos aislados y los unimos explícitamente con saltos de línea dobles
                    const textoEstructurado = Array.from(parrafos)
                        .map(p => p.innerText.trim())
                        .join('\n\n'); 

                    txtDiv.innerText = textoEstructurado;
                    contenedor.scrollTop = 0;
                    if (enMovimiento) alternarPlay();
                } else {
                    txtDiv.innerText = `Error al leer la estructura de ${programa.nombre}. Asegúrate de que siga publicado.`;
                }
            } catch (error) {
                txtDiv.innerText = "Error de conexión directa.\nIntentando un método alternativo de carga...";
                console.error(error);
                // Plan B por si el navegador bloquea la consulta directa en entornos locales
                cargarViaIframe();
            }
        }

        function cargarViaIframe() {
            const programa = obtenerDatosPrograma();
            // Eliminar iframe previo si existe
            const iframeViejo = document.getElementById('iframe-carga');
            if (iframeViejo) iframeViejo.remove();

            const iframe = document.createElement('iframe');
            iframe.id = 'iframe-carga';
            iframe.style.display = 'none';
            iframe.src = `${programa.url}?nocache=${new Date().getTime()}`;
            
            iframe.onload = function() {
                try {
                    const docInterno = iframe.contentDocument || iframe.contentWindow.document;
                    const parrafos = docInterno.querySelectorAll('#contents p');
                    if (parrafos.length > 0) {
                        const textoEstructurado = Array.from(parrafos)
                            .map(p => p.innerText.trim())
                            .join('\n\n');
                        
                        txtDiv.innerText = textoEstructurado;
                        contenedor.scrollTop = 0;
                    }
                } catch (e) {
                    txtDiv.innerText = "Error de seguridad (CORS).\nPor favor, verifica la configuración de publicación de tu Google Doc.";
                }
            };
            document.body.appendChild(iframe);
        }

        // Bucle de animación suave mediante requestAnimationFrame
        function desplazar() {
            if (enMovimiento) {
                contenedor.scrollTop += velocidad;
                idAnimacion = requestAnimationFrame(desplazar);
            }
        }

        function alternarPlay() {
            enMovimiento = !enMovimiento;
            if (enMovimiento) {
                desplazar();
                document.getElementById('btn-play').innerText = "Pausa (Espacio)";
                document.getElementById('btn-play').style.background = "#441111";
            } else {
                cancelAnimationFrame(idAnimacion);
                document.getElementById('btn-play').innerText = "Play (Espacio)";
                document.getElementById('btn-play').style.background = "#222";
            }
        }

        // DETECTOR DE CAMBIO: Al alternar en el switch, cambia el flujo al instante
        selectorGuion.addEventListener('change', () => {
            if (enMovimiento) alternarPlay(); // Pausa el teleprompter para evitar saltos bruscos
            cargarGuion();
        });

        // Eventos de los botones en la barra superior
        document.getElementById('btn-play').addEventListener('click', alternarPlay);
        
        document.getElementById('btn-subir').addEventListener('click', () => {
            velocidad += 0.5;
            document.getElementById('val-velocidad').innerText = velocidad.toFixed(1);
        });

        document.getElementById('btn-bajar').addEventListener('click', () => {
            if (velocidad > 0.5) velocidad -= 0.5;
            document.getElementById('val-velocidad').innerText = velocidad.toFixed(1);
        });

        document.getElementById('btn-espejo').addEventListener('click', () => {
            txtDiv.classList.toggle('espejo');
            document.getElementById('btn-espejo').style.background = txtDiv.classList.contains('espejo') ? "#114411" : "#222";
        });

        document.getElementById('btn-recargar').addEventListener('click', cargarGuion);

        // Control avanzado mediante atajos de teclado globales
        window.addEventListener('keydown', (e) => {
            if (e.code === "Space") {
                e.preventDefault(); // Evita que la pantalla salte abruptamente
                alternarPlay();
            }
            if (e.code === "ArrowUp") {
                e.preventDefault();
                velocidad += 0.5;
                document.getElementById('val-velocidad').innerText = velocidad.toFixed(1);
            }
            if (e.code === "ArrowDown") {
                e.preventDefault();
                if (velocidad > 0.5) velocidad -= 0.5;
                document.getElementById('val-velocidad').innerText = velocidad.toFixed(1);
            }
        });

        // Carga inicial automática al abrir la página
        cargarGuion();
    </script>
</body>
</html>
